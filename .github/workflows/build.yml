name: Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（留空使用 dev）'
        required: false
        default: ''
      upload_artifacts:
        description: '上传构建产物'
        required: false
        type: boolean
        default: true

  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            filename: draurls-linux-amd64
          - goos: linux
            goarch: arm64
            filename: draurls-linux-arm64
          - goos: windows
            goarch: amd64
            filename: draurls-windows-amd64.exe
          - goos: darwin
            goarch: amd64
            filename: draurls-darwin-amd64
          - goos: darwin
            goarch: arm64
            filename: draurls-darwin-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Go dependencies
        working-directory: ./backend
        run: go mod download

      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

      - name: Prepare embedded files
        working-directory: ./backend
        run: |
          mkdir -p cmd/server/web/dist
          cp -r ../frontend/dist/* cmd/server/web/dist/

      - name: Build Backend (${{ matrix.goos }}/${{ matrix.goarch }})
        working-directory: ./backend
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=${{ inputs.version }}
          if [ -z "$VERSION" ]; then
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          go build \
            -ldflags="-s -w -X main.Version=$VERSION" \
            -tags=embed \
            -o ${{ matrix.filename }} \
            ./cmd/server

      - name: Upload artifact
        if: inputs.upload_artifacts != false || github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.filename }}
          path: backend/${{ matrix.filename }}
          retention-days: 7

  build-summary:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Build Summary
        run: |
          echo "## 构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "平台: Linux (AMD64/ARM64), Windows (AMD64), macOS (Intel/Apple Silicon)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "构建产物已上传到 Artifacts，有效期 7 天" >> $GITHUB_STEP_SUMMARY
