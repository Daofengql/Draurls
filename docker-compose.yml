version: '3.8'

services:
  # Draurls 主程序
  draurls:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: draurls
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # 服务器配置
      SERVER_PORT: 8080
      SERVER_MODE: release

      # 数据库配置（请根据实际情况修改）
      DB_HOST: ${DB_HOST:-127.0.0.1}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_NAME: ${DB_NAME:-draurls}
      DB_CHARSET: utf8mb4

      # Redis 配置（请根据实际情况修改）
      REDIS_HOST: ${REDIS_HOST:-127.0.0.1}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}

      # Keycloak OIDC 配置（可选）
      KEYCLOAK_BASE_URL: ${KEYCLOAK_BASE_URL:-}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-draurls}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-draurls}
      KEYCLOAK_SECRET: ${KEYCLOAK_SECRET:-}
      KEYCLOAK_CALLBACK_URL: ${KEYCLOAK_CALLBACK_URL:-http://localhost:8080/api/auth/callback}

      # JWT ��钥（生产环境请修改）
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-change-in-production}

      # 缓存配置
      CACHE_HOT_TTL: ${CACHE_HOT_TTL:-3600}
      CACHE_WARM_TTL: ${CACHE_WARM_TTL:-86400}
      CACHE_COLD_TTL: ${CACHE_COLD_TTL:-604800}

      # 限流配置
      RATE_LIMIT_IP: ${RATE_LIMIT_IP:-100}
      RATE_LIMIT_USER: ${RATE_LIMIT_USER:-200}
      RATE_LIMIT_API: ${RATE_LIMIT_API:-500}
      RATE_LIMIT_GLOBAL: ${RATE_LIMIT_GLOBAL:-10000}

      # Worker 配置
      WORKER_POOL_SIZE: ${WORKER_POOL_SIZE:-100}
      WORKER_TASK_QUEUE_SIZE: ${WORKER_TASK_QUEUE_SIZE:-1000}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
