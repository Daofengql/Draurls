<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>账号已禁用</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            padding: 20px;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            max-width: 400px;
            width: 100%;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        .title {
            font-size: 24px;
            color: #1f2937;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .subtitle {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 24px;
        }
        .info-box {
            text-align: left;
            background: #fef2f2;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            border-left: 4px solid #ef4444;
        }
        .info-box p {
            margin: 8px 0;
            color: #991b1b;
            font-size: 14px;
        }
        .info-box p strong {
            color: #7f1d1d;
        }
        .btn {
            padding: 12px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            background: #ef4444;
            color: white;
        }
        .btn:hover {
            background: #dc2626;
        }
        .footer-text {
            margin-top: 24px;
            font-size: 13px;
            color: #9ca3af;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🔒</div>
        <h2 class="title">账号已禁用</h2>
        <p class="subtitle">您的账号暂时无法登录</p>

        <div class="info-box">
            <p><strong>用户名：</strong>{{ .Username }}</p>
            <p style="margin-top: 12px;">
                您的账号已被管理员禁用。如需恢复访问，请联系系统管理员。
            </p>
        </div>

        <button class="btn" onclick="closeWindow()">关闭窗口</button>

        <p class="footer-text">如有疑问，请联系技术支持</p>
    </div>

    <script>
        function closeWindow() {
            window.close();
            // 如果窗口无法关闭（某些浏览器限制），显示提示
            setTimeout(function() {
                if (!window.closed) {
                    document.querySelector('.footer-text').textContent =
                        '请手动关闭此窗口';
                }
            }, 500);
        }
    </script>
</body>
</html>
